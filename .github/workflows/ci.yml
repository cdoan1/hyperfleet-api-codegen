  # Temporarily disabled: golangci-lint v1.64.8 is built with Go 1.24 and cannot lint Go 1.26 code
  # Re-enable when golangci-lint releases a version built with Go 1.26+

  verify:
    name: Verify Generated Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build tools
        run: |
          go build -o bin/marker-scanner ./cmd/marker-scanner
          go build -o bin/passthrough-gen ./cmd/passthrough-gen
          go build -o bin/openapi-gen ./cmd/openapi-gen

      - name: Verify field registry is up to date
        run: |
          ./bin/marker-scanner --input-dirs=./api/v1alpha1 --output-file=/tmp/field_metadata.go
          diff pkg/registry/field_metadata.go /tmp/field_metadata.go || (
            echo "Error: pkg/registry/field_metadata.go is out of date"
            echo "Run: make generate-registry"
            exit 1
          )

      - name: Verify OpenAPI schema is up to date
        run: |
          ./bin/openapi-gen --input-dirs=./api/v1alpha1 --output-file=/tmp/openapi.json --title="HyperFleet API" --version=v1alpha1
          diff openapi/openapi.json /tmp/openapi.json || (
            echo "Error: openapi/openapi.json is out of date"
            echo "Run: make generate-openapi"
            exit 1
          )

      # Note: Marker validation is done by the marker-scanner --validate flag above
      # which properly parses Go AST to verify visible fields have write-mode markers

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all tools
        run: |
          go build -o bin/marker-scanner ./cmd/marker-scanner
          go build -o bin/passthrough-gen ./cmd/passthrough-gen
          go build -o bin/openapi-gen ./cmd/openapi-gen
          go build -o bin/featuregate-info ./cmd/featuregate-info

      - name: Test tools run
        run: |
          ./bin/marker-scanner --help
          ./bin/passthrough-gen --help
          ./bin/openapi-gen --help
          ./bin/featuregate-info

  test-hypershift-bump:
    name: Test HyperShift Version Bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git operations

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          go mod download
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Build tools
        run: make build-tools

      - name: Configure git for test
        run: |
          git config user.name "CI Test Bot"
          git config user.email "ci@hyperfleet-api-codegen.test"

      - name: Run HyperShift bump test
        run: .github/workflows/test-scripts/test-hypershift-bump.sh

      - name: Show diff summary
        if: always()
        run: |
          echo "=== Git Diff Summary ==="
          git diff --stat || echo "No changes"

      - name: Show detailed changes in passthrough file
        if: always()
        run: |
          echo "=== Changes in hostedclusterspec.passthrough.go ==="
          if git diff --quiet api/v1alpha1/hostedclusterspec.passthrough.go; then
            echo "No changes to passthrough file"
          else
            git diff --unified=3 api/v1alpha1/hostedclusterspec.passthrough.go | head -100
          fi

      - name: Show field count changes
        if: always()
        run: |
          echo "=== Field Count Summary ==="
          echo "Current registry field count:"
          cat pkg/registry/field_metadata.json | jq '. | length' || echo "Could not parse JSON"

          echo ""
          echo "Fields with write-mode markers:"
          cat pkg/registry/field_metadata.json | jq '[.[] | select(.writeMode != "")] | length' || echo "Could not parse JSON"

          echo ""
          echo "Hidden fields:"
          cat pkg/registry/field_metadata.json | jq '[.[] | select(.hidden == true)] | length' || echo "Could not parse JSON"

          echo ""
          echo "Feature-gated fields:"
          cat pkg/registry/field_metadata.json | jq '[.[] | select(.featureGate != "")] | length' || echo "Could not parse JSON"

      - name: Restore original state
        if: always()
        run: |
          git reset --hard HEAD
          git clean -fd
          echo "Repository restored to original state"
