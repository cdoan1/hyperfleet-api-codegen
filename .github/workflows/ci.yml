name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  verify:
    name: Verify Generated Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build tools
        run: |
          go build -o bin/marker-scanner ./cmd/marker-scanner
          go build -o bin/passthrough-gen ./cmd/passthrough-gen
          go build -o bin/openapi-gen ./cmd/openapi-gen

      - name: Verify field registry is up to date
        run: |
          ./bin/marker-scanner --input-dirs=./api/v1alpha1 --output-file=/tmp/field_metadata.go
          diff pkg/registry/field_metadata.go /tmp/field_metadata.go || (
            echo "Error: pkg/registry/field_metadata.go is out of date"
            echo "Run: make generate-registry"
            exit 1
          )

      - name: Verify OpenAPI schema is up to date
        run: |
          ./bin/openapi-gen --input-dirs=./api/v1alpha1 --output-file=/tmp/openapi.json --title="HyperFleet API" --version=v1alpha1
          diff openapi/openapi.json /tmp/openapi.json || (
            echo "Error: openapi/openapi.json is out of date"
            echo "Run: make generate-openapi"
            exit 1
          )

      - name: Verify all passthrough fields have markers
        run: |
          # Check that all fields in passthrough files have required markers
          if grep -r "json:" api/v1alpha1/*passthrough.go | grep -v "+k8s:openapi-gen" | grep -v "+hyperfleet:write-mode"; then
            echo "Error: Some passthrough fields are missing required markers"
            echo "All fields must have +k8s:openapi-gen and +hyperfleet:write-mode markers"
            exit 1
          fi
          echo "✓ All passthrough fields have required markers"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all tools
        run: |
          go build -o bin/marker-scanner ./cmd/marker-scanner
          go build -o bin/passthrough-gen ./cmd/passthrough-gen
          go build -o bin/openapi-gen ./cmd/openapi-gen
          go build -o bin/featuregate-info ./cmd/featuregate-info

      - name: Test tools run
        run: |
          ./bin/marker-scanner --help
          ./bin/passthrough-gen --help
          ./bin/openapi-gen --help
          ./bin/featuregate-info
